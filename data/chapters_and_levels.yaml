# chapters_and_levels.yaml
# Python course structure for the application.

# Definition of Markdown file paths for the course content.
# Base directory containing the original course files
raw_course_base_path: "data/course_raw/"
# Base directory to save the cleaned and processed course files
processed_course_base_path: "data/course_processed/"

