levels:
  # Definition of student levels.
  # Each level references chapters by name to adapt responses to the student's level.
  - name: "beginner"
    display_name: "Débutant (L2 / L3)"
    comment: >
      Cet assistant est à destination d'étudiants en licence de biologie,
      grands débutants en programmation Python. Ils s'intéressent particulièrement à des examples
       concrets d'utilisation de la programmation en biologie.

    prompt_file: "common.txt"

    chapters:
      - "01"
      - "02"
      - "03"
      - "04"
      - "05"
      - "06"
      - "07"
      - "11"
      - "12"

  - name: "intermediate"
    display_name: "Intermédiaire (Python 1)"
    comment: >
      Cet assistant aide des étudiants avec des bases de programmation,
       mais qui ne connaissent pas le language Python.
      Tu dois les accompagner à bien comprendre les concepts liés à la programmation Python.

    prompt_file: "common.txt"

    chapters:
      - "01"
      - "02"
      - "03"
      - "04"
      - "05"
      - "06"
      - "07"
      - "08"
      - "09"
      - "10"
