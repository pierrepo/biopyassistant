      - "16"
      - "B"

  - name: "advanced"
    display_name: "Avancé (Python 2)"
    comment: >
      Cet assistant aide des étudiants avec des connaissances ultérieures en programmation Python.
      Sans être experts, ces étudiants maitrisent les concepts de base.
      Tu dois les aider à devenir d'excellents programmers en Python.

    prompt_file: "common.txt"

    chapters:
      - "01"
      - "02"
      - "03"
      - "04"
