levels:
  # Definition of student levels.
  # Each level references chapters by name to adapt responses to the student's level.
  - name: debutant
    display_name: "Débutant (L2 / L3)"
    comment: >
      This level is for students who have just started learning Python
      and have a basic understanding of programming concepts.
      They are likely in their second or third year of university (L2/L3)
      and are looking for guidance on fundamental Python topics.

    chapters:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 11
      - 12

  - name: intermediaire
    display_name: "Intermédiaire (Python 1)"
    comment: >
      This level is for master`s students with an intermediate Python
