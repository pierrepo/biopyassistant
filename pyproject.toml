[project]
name = "biopyassistantenv"
version = "0.1.0"
description = "BioPyAssistant environment"
readme = "README.md"
requires-python = "==3.13.*"

dependencies = [
    "python-dotenv",
    "pycodestyle",
    "pydocstyle",
    "pylint",
    "black",
    "ruff",
    "mypy",
    "chromadb",
    "openai",
    "tiktoken",
    "langchain",
    "langchain-openai",
    "langchain-chroma",
    "langchain-core",
    "langchain-community",
    "langchain-text-splitters",
    "loguru",
    "streamlit",
    "gradio>=4.43",
    "click>=8.3.0",
]

[dependency-groups]
dev = [
    "prek>=0.3.0",
]
